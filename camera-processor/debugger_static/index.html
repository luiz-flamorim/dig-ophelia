<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dig Ophelia — Camera Debugger</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/debugger.css" />
  </head>
  <body>
    <header id="page-header">
      <h1 id="title">Camera Debugger</h1>
      <div id="status-bar">
        <span id="status-fps">FPS: —</span>
        <span id="status-bg">Background: —</span>
        <span id="status-host">Host: —</span>
      </div>
    </header>

    <div id="main-layout">
      <div id="matrix-panel">
        <h2 class="panel-label">Matrix</h2>
        <div id="matrix-view">
          <img id="stream" alt="Processed mask" />
          <div id="grid-display"></div>
        </div>
      </div>
    </div>

    <div id="controls">
      <div class="slider-container">
        <label for="bg-threshold-slider">
          Threshold <span id="threshold-value">30</span>
        </label>
        <div class="slider-wrapper">
          <input
            type="range"
            id="bg-threshold-slider"
            class="threshold-slider"
            min="0"
            max="100"
            step="1"
            value="30"
          />
        </div>
      </div>

      <div class="buttons-container">
        <button id="preview-btn" class="toggle-btn">Processed view</button>
        <button id="invert-btn" class="toggle-btn">Invert</button>
        <button id="bg-capture-btn" class="toggle-btn">Capture background</button>
      </div>

      <div id="probe-panel">
        <div class="probe-header">
          <button id="probe-toggle-btn" class="toggle-btn">Wiring probe</button>
          <span id="probe-status" class="probe-status">off</span>
        </div>
        <div id="probe-readout">
          <span>index <strong id="probe-index">0</strong></span>
          <span>tile <strong id="probe-tile">0</strong></span>
          <span>module <strong id="probe-module">0</strong></span>
        </div>
        <div id="probe-module-buttons" class="buttons-container probe-buttons"></div>
        <div id="probe-mode-buttons" class="buttons-container probe-buttons">
          <button id="probe-mode-cell-btn" class="toggle-btn" data-mode="cell" disabled>Cell</button>
          <button id="probe-mode-row-btn" class="toggle-btn" data-mode="row" disabled>Row</button>
          <button id="probe-mode-col-btn" class="toggle-btn" data-mode="col" disabled>Col</button>
        </div>
        <div class="buttons-container probe-buttons">
          <button id="probe-prev-btn" class="toggle-btn" disabled>Prev</button>
          <button id="probe-auto-btn" class="toggle-btn" disabled>Auto</button>
          <button id="probe-next-btn" class="toggle-btn" disabled>Next</button>
        </div>
      </div>
    </div>

    <script src="/static/debugger.js"></script>
  </body>
</html>
