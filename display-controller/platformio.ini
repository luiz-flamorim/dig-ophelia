; PlatformIO / PioArduino — open this folder as the project root in Cursor.
; Before first upload: copy config.example.h → config.h and set WiFi + PI_HOST.

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_src_filter = +<*> -<.git/> -<config.example.h>
